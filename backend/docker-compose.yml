services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: mobile_course
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d mobile_course -h 127.0.0.1"]
      interval: 5s
      timeout: 5s
      retries: 20

  api:
    build:
      context: .
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://app:app@db:5432/mobile_course
      SEED_DEMO_DATA: "true"

volumes:
  postgres_data:
